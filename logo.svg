<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <filter id="glow-b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#090912"/>

  <!-- Blue arc — Strategy (top-right) -->
  <path d="M 34 22.3 A 32 32 0 0 1 77.7 66"
        stroke="#3d8bff" stroke-width="10" fill="none" stroke-linecap="round"
        filter="url(#glow-b)"/>

  <!-- Green arc — Automation (bottom-left) -->
  <path d="M 66 77.7 A 32 32 0 0 1 22.3 34"
        stroke="#00C853" stroke-width="10" fill="none" stroke-linecap="round"
        filter="url(#glow-g)"/>
</svg>
