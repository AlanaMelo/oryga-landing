<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="440" height="120">
  <defs>
    <filter id="glow-b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d8bff"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="220" height="60" rx="14" fill="#090912"/>

  <!-- Symbol — center (30, 30), radius 16 -->
  <!-- Blue arc: 240° → 30° clockwise -->
  <path d="M 22 16.1 A 16 16 0 0 1 43.9 38"
        stroke="#3d8bff" stroke-width="5.5" fill="none" stroke-linecap="round"
        filter="url(#glow-b)"/>
  <!-- Green arc: 60° → 210° clockwise -->
  <path d="M 38 43.9 A 16 16 0 0 1 16.1 22"
        stroke="#00C853" stroke-width="5.5" fill="none" stroke-linecap="round"
        filter="url(#glow-g)"/>

  <!-- Divider -->
  <line x1="62" y1="14" x2="62" y2="46"
        stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- "O" in gradient, "ryga" in white -->
  <text x="72" y="40"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="28" font-weight="700" letter-spacing="-0.5"
        fill="url(#text-grad)">O</text>
  <text x="90" y="40"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="28" font-weight="700" letter-spacing="-0.5"
        fill="#eef2ff">ryga</text>
</svg>
